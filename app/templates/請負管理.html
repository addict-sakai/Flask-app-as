<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>請負管理 | FujiPara System</title>
  <link rel="stylesheet" href="../static/style_cont_info.css" />
</head>
<body>

<!-- ============================================================
     グローバルヘッダー（全幅・黒）
     ============================================================ -->
<header class="global-header">
  <div class="global-header-left">
    <a href="/apply_staff_manage" class="btn-back-header">← 管理</a>
  </div>
  <div class="global-header-center">
    <span class="global-title">請負管理</span>
  </div>
  <div class="global-header-right">
    <!-- ハンバーガーメニュー -->
    <div class="hamburger-wrap">
      <button class="hamburger-btn" id="hamburger-btn" onclick="toggleHamburger()" aria-label="メニュー">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <div class="hamburger-dropdown" id="hamburger-dropdown">
        <a href="#"
           class="hamburger-item active"
           id="hmenu-flight"
           onclick="switchView('flight'); closeHamburger(); return false;">
          <span class="hamburger-icon">✈</span>
          フライト状況
        </a>
        <a href="#"
           class="hamburger-item"
           id="hmenu-work"
           onclick="switchView('work'); closeHamburger(); return false;">
          <span class="hamburger-icon">📆</span>
          出勤可否状況
        </a>
        <a href="#"
           class="hamburger-item"
           id="hmenu-handover"
           onclick="switchView('handover'); closeHamburger(); return false;">
          <span class="hamburger-icon">📋</span>
          引継ぎ報告事項
        </a>
      </div>
    </div>
  </div>
</header>

<!-- ============================================================
     ボディラッパー（メインのみ・サイドバーなし）
     ============================================================ -->
<div class="body-wrapper">

  <div class="main-content">

    <!-- ======================================================
         VIEW: フライト状況
         ====================================================== -->
    <div class="view-panel" id="view-flight">

      <!-- コントロールバー -->
      <div class="control-bar">
        <div class="month-nav">
          <button class="btn btn-ghost btn-sm" onclick="repMonthPrev()">◀ 前月</button>
          <span class="month-label" id="rep-month-label">—</span>
          <button class="btn btn-ghost btn-sm" onclick="repMonthNext()">翌月 ▶</button>
        </div>
        <span class="view-title">✈ フライト状況</span>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm" id="btn-show-all" onclick="toggleShowAll()">
            フライトあり
          </button>
        </div>
      </div>

      <!-- テーブル -->
      <div class="scroll-area">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th class="col-name">名前</th>
                <th class="col-num center">フライト日数</th>
                <th class="col-num center">フライト本数</th>
                <th class="col-num center">最低保証日数</th>
                <th class="col-amount right">合計金額</th>
              </tr>
            </thead>
            <tbody id="flight-total-subhead"></tbody>
            <tbody id="flight-status-body">
              <tr class="loading-row">
                <td colspan="5">読み込み中…</td>
              </tr>
            </tbody>
            <tfoot id="flight-status-foot"></tfoot>
          </table>
        </div>
      </div>

    </div><!-- /#view-flight -->


    <!-- ======================================================
         VIEW: 出勤可否状況
         ====================================================== -->
    <div class="view-panel hidden" id="view-work">

      <!-- コントロールバー -->
      <div class="control-bar">
        <div class="month-nav">
          <button class="btn btn-ghost btn-sm" id="wc-prev-btn" onclick="wcMonthPrev()">◀ 前月</button>
          <span class="month-label" id="wc-month-label">—</span>
          <button class="btn btn-ghost btn-sm" id="wc-next-btn" onclick="wcMonthNext()">翌月 ▶</button>
        </div>
        <span class="view-title">📆 出勤可否状況</span>
        <div class="legend">
          <span><span class="status-ok">○</span> 出勤可</span>
          <span><span class="status-ng">×</span> 出勤不可</span>
          <span><span class="status-null">　</span> 未入力</span>
        </div>
      </div>

      <div class="scroll-area" id="wc-scroll-area">
        <div id="wc-table-wrap">
          <p class="loading-text">読み込み中…</p>
        </div>
      </div>

    </div><!-- /#view-work -->


    <!-- ======================================================
         VIEW: 引継ぎ報告事項
         ====================================================== -->
    <div class="view-panel hidden" id="view-handover">

      <!-- コントロールバー -->
      <div class="control-bar">
        <div class="month-nav">
          <button class="btn btn-ghost btn-sm" onclick="handoverMonthPrev()">◀ 前月</button>
          <span class="month-label" id="handover-month-label">—</span>
          <button class="btn btn-ghost btn-sm" onclick="handoverMonthNext()">翌月 ▶</button>
        </div>
        <span class="view-title">📋 引継ぎ報告事項</span>
        <div></div>
      </div>

      <div class="scroll-area">
        <div id="handover-cards" class="handover-cards-wrap">
          <p class="loading-text">読み込み中…</p>
        </div>
      </div>

    </div><!-- /#view-handover -->

  </div><!-- /.main-content -->
</div><!-- /.body-wrapper -->


<!-- ============================================================
     Detail Modal
     ============================================================ -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-text">詳細</span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
    <div class="modal-footer" id="modal-summary"></div>
  </div>
</div>

<script src="../static/app_cont_info.js"></script>
</body>
</html>
