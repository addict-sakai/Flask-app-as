<!DOCTYPE html>
<!-- ツアー選択.html  新規作成（2026/04/11） -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ツアー申込 | Mt.FUJI PARAGLIDING</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f6f8;
      --surface: #ffffff;
      --border:  #d1d5db;
      --accent:  #2563eb;
      --danger:  #dc2626;
      --text-primary:   #0a0f1a;
      --text-secondary: #1f2937;
      --text-muted:     #6b7280;
      --radius:  10px;
      --font:    'Noto Sans JP', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── ヘッダー ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #000;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 50;
    }
    .header-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: var(--radius);
      transition: background 0.18s;
      white-space: nowrap;
    }
    .header-back:hover { background: rgba(255,255,255,0.12); }
    .header-title {
      flex: 1;
      text-align: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .header-spacer { min-width: 90px; }

    /* ── メイン ── */
    .main {
      padding-top: 72px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 480px;
      margin: 0 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-heading {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── 新規申込ボタン ── */
    .btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 20px;
      border-radius: var(--radius);
      background: #000;
      color: #fff;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-new:hover { background: #222; }
    .btn-new-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.75;
      display: block;
      margin-top: 2px;
    }

    /* ── 区切り ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── 検索フォーム ── */
    .edit-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .booking-no-row {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.15s;
    }
    .booking-no-row:focus-within { border-color: var(--accent); }

    .booking-no-prefix {
      padding: 0 12px;
      height: 48px;
      display: flex;
      align-items: center;
      background: #f3f4f6;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }

    .booking-no-input {
      flex: 1;
      height: 48px;
      border: none;
      outline: none;
      padding: 0 14px;
      font-family: 'DM Mono', monospace;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      background: transparent;
    }
    .booking-no-input::placeholder {
      font-weight: 400;
      letter-spacing: 0;
      color: #9ca3af;
      font-size: 14px;
      font-family: var(--font);
    }

    .btn-search {
      height: 48px;
      padding: 0 20px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-search:hover { background: #1d4ed8; }

    /* ── エラー・メッセージ ── */
    .search-msg {
      margin-top: 10px;
      font-size: 13px;
      color: var(--danger);
      min-height: 18px;
      text-align: center;
    }
    .search-msg.ok { color: #16a34a; }

    /* ── モバイル ── */
    @media (max-width: 520px) {
      .card { padding: 28px 18px; }
      .btn-new { font-size: 16px; padding: 18px; }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <a href="/apply_flyer" class="header-back">← トップ</a>
    <div class="header-title">ツアー申込</div>
    <div class="header-spacer"></div>
  </header>

  <!-- メイン -->
  <main class="main">
    <div class="card">
      <p class="card-heading">Mt.FUJI PARAGLIDING — ツアー申込</p>

      <!-- 新規申込 -->
      <a href="/apply_tour" class="btn-new">
        <span style="font-size:22px;">📋</span>
        <div style="display:flex;flex-direction:column;align-items:flex-start;">
          <span>新規申込</span>
          <span class="btn-new-sub">New Application</span>
        </div>
      </a>

      <div class="divider">または</div>

      <!-- 申込内容編集 -->
      <p class="edit-label">申込内容の編集・削除</p>
      <div class="booking-no-row">
        <span class="booking-no-prefix">TU-</span>
        <input
          type="text"
          class="booking-no-input"
          id="bookingNoInput"
          placeholder="登録番号（数字）を入力"
          inputmode="numeric"
          maxlength="5"
          autocomplete="off"
        >
        <button type="button" class="btn-search" id="searchBtn">検索</button>
      </div>
      <p class="search-msg" id="searchMsg"></p>
    </div>
  </main>

  <script>
  "use strict";

  const inp    = document.getElementById("bookingNoInput");
  const btn    = document.getElementById("searchBtn");
  const msg    = document.getElementById("searchMsg");

  // 数字のみ入力許可
  inp.addEventListener("input", () => {
    inp.value = inp.value.replace(/[^\d]/g, "");
    msg.textContent = "";
    msg.className = "search-msg";
  });
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") btn.click();
  });

  btn.addEventListener("click", async () => {
    const num = inp.value.trim();
    if (!num) {
      msg.textContent = "番号を入力してください";
      return;
    }
    const bookingNo = `TU-${num.padStart(5, "0")}`;
    msg.textContent = "検索中…";
    msg.className = "search-msg";

    try {
      const res  = await fetch(`/api/tour/bookings/by-no/${encodeURIComponent(bookingNo)}`);
      if (res.status === 404) {
        msg.textContent = `${bookingNo} は見つかりませんでした`;
        return;
      }
      if (!res.ok) throw new Error("サーバーエラー");
      const data = await res.json();
      // 編集ページへ遷移
      window.location.href = `/apply_tour?edit=${encodeURIComponent(bookingNo)}`;
    } catch (err) {
      msg.textContent = "検索中にエラーが発生しました";
      console.error(err);
    }
  });
  </script>
</body>
</html>
