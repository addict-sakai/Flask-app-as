<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スタッフ管理画面</title>
  <link rel="stylesheet" href="../static/style_staff_manage.css" />
</head>
<body>

  <header class="global-header">
    <div class="global-header-left">
      <a href="/" class="back-btn">← トップ</a>
    </div>
    <div class="global-header-center">
      <span class="page-name">スタッフ管理画面</span>
    </div>
    <div class="global-header-right"></div>
  </header>

  <div class="body-wrapper">

    <!-- ── サイドバー ── -->
    <aside class="staff-sidebar">
      <nav class="staff-sidebar-nav">
        <a href="/apply_info"         class="staff-nav-item">👤<span>個人情報管理</span></a>
        <a href="/apply_cont_info"    class="staff-nav-item">📋<span>請負管理</span></a>
        <a href="/apply_io_info"      class="staff-nav-item">⛰<span>入下山管理</span></a>
        <a href="/apply_tour_status"  class="staff-nav-item">🗓<span>ツアー状況</span></a>
        <a href="/apply_exp_resv"     class="staff-nav-item">🪂<span>体験管理</span></a>
        <a href="/apply_exp_status"   class="staff-nav-item">📊<span>体験状況</span></a>
        <a href="/apply_info?view=qr" class="staff-nav-item">🪪<span>QRカード作成</span></a>
        <a href="/apply_config"       class="staff-nav-item">⚙️<span>設定管理</span></a>
      </nav>
    </aside>

    <!-- ── メインエリア ── -->
    <div class="main-wrapper">
      <main class="main-content">

        <!-- ── 上部：申請バナー2個 ── -->
        <div class="banner-row">

          <!-- 各種申請/更新 -->
          <div class="info-banner" id="applyBanner">
            <div class="banner-body" id="applyBannerBtn">
              <span class="banner-label">各種申請/更新</span>
              <span class="banner-status" id="applyBannerStatus">—</span>
            </div>
          </div>

          <!-- 期限前/期限切れ -->
          <div class="info-banner" id="expiryBanner">
            <div class="banner-body" id="expiryBannerBtn">
              <span class="banner-label">フライヤー各種期限前/期限切れ</span>
              <span class="banner-status" id="expiryBannerStatus">—</span>
            </div>
          </div>

        </div>

        <!-- ── バナークリック時の詳細エリア ── -->
        <div id="bannerDetail" class="banner-detail-wrap" style="display:none;"></div>

        <!-- ── カレンダー ── -->
        <div class="calendar-card">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="calPrev">◀ 前月</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-nav-btn" id="calNext">翌月 ▶</button>
          </div>
          <div class="calendar-grid-wrap">
            <div class="calendar-dow-row">
              <div class="cal-dow sun">日</div>
              <div class="cal-dow">月</div>
              <div class="cal-dow">火</div>
              <div class="cal-dow">水</div>
              <div class="cal-dow">木</div>
              <div class="cal-dow">金</div>
              <div class="cal-dow sat">土</div>
            </div>
            <div class="calendar-cells" id="calendarCells"></div>
          </div>
        </div>

        <!-- ── カレンダー日付クリック詳細 ── -->
        <div id="calDetail" class="cal-detail-wrap" style="display:none;"></div>

      </main>
    </div>
  </div>

  <!-- ── ツアー申請詳細モーダル ── -->
  <div id="tourModal" style="
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); backdrop-filter:blur(3px);
    align-items:center; justify-content:center; z-index:800;">
    <div style="
      background:#fff; border-radius:12px; padding:28px;
      width:90%; max-width:520px; max-height:85vh; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <h3 id="tourModalTitle" style="
        font-size:16px; font-weight:700; margin-bottom:16px;
        padding-bottom:10px; border-bottom:1px solid #e0e3e8;">
        ツアー申請詳細
      </h3>
      <div id="tourModalBody" style="margin-bottom:20px;"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap;">
        <button onclick="closeTourModal()" style="
          padding:8px 20px; background:transparent; color:#374151;
          border:1px solid #d1d5db; border-radius:6px;
          font-size:13px; font-weight:500; cursor:pointer; font-family:inherit;">
          閉じる
        </button>
        <button onclick="openTourEdit()" style="
          padding:8px 20px; background:#6b7280; color:#fff;
          border:none; border-radius:6px;
          font-size:13px; font-weight:500; cursor:pointer; font-family:inherit;">
          詳細編集
        </button>
        <button id="tourApproveBtn" onclick="doApproveTour()" style="
          padding:8px 20px; background:#0ea5e9; color:#fff;
          border:none; border-radius:6px;
          font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;">
          ✉ 承認・案内メール送信
        </button>
      </div>
    </div>
  </div>

  <!-- ツアー案内メール送信モーダル -->
  <div class="modal-overlay" id="tourMailModal" style="display:none;">
    <div class="modal-box" style="max-width:520px; width:92%;">
      <h3 class="modal-title">✉️ ツアー承認・案内メール送信</h3>
      <input type="hidden" id="tourMailBookingId">
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">送信元</label>
        <select id="tourMailFrom" style="width:100%; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;"></select>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">送信先</label>
        <input type="email" id="tourMailTo" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;" placeholder="送信先メールアドレス">
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">件名</label>
        <input type="text" id="tourMailSubject" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">本文</label>
        <textarea id="tourMailBody" rows="10" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit; resize:vertical;"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeTourMailModal()">キャンセル</button>
        <button class="btn-ok" id="tourMailSendBtn" onclick="doSendTourMail()">📨 送信する</button>
      </div>
    </div>
  </div>

  <!-- 体験予約詳細モーダル -->
  <div id="expModal" style="
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.55); backdrop-filter:blur(3px);
    align-items:center; justify-content:center; z-index:800;">
    <div style="
      background:#fff; border-radius:12px; padding:28px;
      width:90%; max-width:480px; max-height:85vh; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <h3 id="expModalTitle" style="
        font-size:16px; font-weight:700; margin-bottom:16px;
        padding-bottom:10px; border-bottom:1px solid #e0e3e8;">
        体験予約詳細
      </h3>
      <div id="expModalBody" style="margin-bottom:20px;"></div>
      <div style="display:flex; justify-content:flex-end; gap:10px;">
        <button onclick="closeExpModal()" style="
          padding:8px 20px; background:transparent; color:#374151;
          border:1px solid #d1d5db; border-radius:6px;
          font-size:13px; font-weight:500; cursor:pointer; font-family:inherit;">
          閉じる
        </button>
        <button onclick="goToExpDetail()" style="
          padding:8px 20px; background:#2563eb; color:#fff;
          border:none; border-radius:6px;
          font-size:13px; font-weight:500; cursor:pointer; font-family:inherit;">
          体験管理で編集
        </button>
      </div>
    </div>
  </div>

  <!-- 入金確認モーダル -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal-box">
      <h3 class="modal-title" id="confirmModalTitle">入金確認</h3>
      <p id="confirmModalText"></p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeConfirmModal()">キャンセル</button>
        <button class="btn-ok"     onclick="doConfirmPayment()">確認済みにする</button>
      </div>
    </div>
  </div>

  <!-- フライヤー更新・変更 承認・却下モーダル -->
  <div class="modal-overlay" id="updateAppModal" style="display:none;">
    <div class="modal-box">
      <h3 class="modal-title" id="updateAppModalTitle">更新・変更申請の確認</h3>
      <p id="updateAppModalMeta" style="font-size:13px; color:#666; margin-bottom:10px;"></p>
      <div id="updateAppChangeList" style="
        max-height:260px; overflow-y:auto;
        border:1px solid #e0e0e0; border-radius:6px;
        padding:10px; margin-bottom:14px; font-size:13px;
      "></div>
      <div id="updateAppRejectRow" style="display:none; margin-bottom:12px;">
        <label style="font-size:13px; font-weight:600;">却下理由（任意）</label>
        <textarea id="updateAppRejectNote" rows="2" style="
          width:100%; box-sizing:border-box; margin-top:4px;
          border:1px solid #ccc; border-radius:4px; padding:6px; font-size:13px;
        "></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel"  onclick="closeUpdateAppModal()">閉じる</button>
        <button class="btn-reject"  onclick="toggleRejectMode()" id="btnRejectToggle"
          style="background:#e17055; color:#fff; border:none; padding:8px 18px; border-radius:6px; font-size:13px; font-weight:700; cursor:pointer;">却下</button>
        <button class="btn-ok"      onclick="doApproveApp()" id="btnApprove">承認する</button>
      </div>
    </div>
  </div>

  <!-- 案内メール送信モーダル（期限アラート用） -->
  <div class="modal-overlay" id="expiryMailModal" style="display:none;">
    <div class="modal-box" style="max-width:520px; width:92%;">
      <h3 class="modal-title">✉️ 案内メール送信</h3>
      <input type="hidden" id="expiryMailMemberId">
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">送信元</label>
        <select id="expiryMailFrom" style="width:100%; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;"></select>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">送信先</label>
        <input type="email" id="expiryMailTo" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;" placeholder="送信先メールアドレス">
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">件名</label>
        <input type="text" id="expiryMailSubject" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit;" placeholder="件名">
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">本文</label>
        <textarea id="expiryMailBody" rows="10" style="width:100%; box-sizing:border-box; padding:7px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; font-family:inherit; resize:vertical;"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeExpiryMailModal()">キャンセル</button>
        <button class="btn-ok" id="expiryMailSendBtn" onclick="doSendExpiryMail()">📨 送信する</button>
      </div>
    </div>
  </div>

  <script src="../static/app_staff_manage.js"></script>
</body>
</html>
